<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قرأني - نظام متكامل لحفظ القرآن الكريم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background - Gloomy Professional Design -->
    <div class="background-overlay"></div>
    
    <!-- System Header -->
    <header class="system-header">
        <div class="header-content">
            <h1 class="system-name">قرأني</h1>
            <p class="system-tagline">نظام متكامل لحفظ القرآن الكريم</p>
        </div>
    </header>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Voice Visualizer (Center) -->
        <div class="voice-visualizer-container">
            <div id="voiceVisualizer" class="voice-visualizer">
                <div class="visualizer-dots" id="visualizerDots">
                    <!-- 288 dots will be generated by JavaScript -->
                </div>
            </div>
            <div id="voiceStatus" class="voice-status">اضغط للتحدث</div>
        </div>

        <!-- Output Text Box -->
        <div id="outputBox" class="output-box hidden">
            <div class="output-header">
                <span class="output-icon">🎙️</span>
                <span class="output-title">الاستجابة</span>
                <button class="close-output" onclick="closeOutput()">×</button>
            </div>
            <div id="outputContent" class="output-content"></div>
        </div>

        <!-- Mode Toggle Button (تسميع) - Bottom Right -->
        <button id="quranModeButton" class="quran-mode-button" onclick="toggleQuranMode()" title="تبديل وضع التسميع">
            <span class="mode-icon">📖</span>
            <span class="mode-text">تسميع</span>
        </button>

        <!-- Chat Button (Bottom Left) -->
        <button id="chatButton" class="chat-button" onclick="toggleChat()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="currentColor"/>
            </svg>
        </button>

        <!-- Chat Panel -->
        <div id="chatPanel" class="chat-panel hidden">
            <div class="chat-header">
                <h3>💬 المحادثة</h3>
                <button class="close-chat" onclick="toggleChat()">×</button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="اسأل عن التفسير، التجويد، أو أي شيء..."
                    dir="rtl"
                />
                <button id="sendChatBtn" class="send-button" onclick="sendChatMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Input -->
    <input type="file" id="audioFileInput" accept="audio/*" style="display: none;">

    <script src="app.js"></script>
</body>
</html>
